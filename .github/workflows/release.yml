name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Upload Assets
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ai_model_router.tar.gz
            asset_path: ./ai_model_router.tar.gz
          - os: windows-latest
            artifact_name: ai_model_router-windows.zip
            asset_path: ./ai_model_router-windows.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Linux release archive
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czf ai_model_router.tar.gz \
            AI_MODEL_ROUTER.py \
            config.json \
            requirements.txt \
            INICIAR-AI_MODEL_ROUTER.bat \
            README.md \
            CONTRIBUTING.md \
            LICENSE \
            .github

      - name: Create Windows release archive
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive \
            -Path AI_MODEL_ROUTER.py,config.json,requirements.txt,INICIAR-AI_MODEL_ROUTER.bat,README.md,CONTRIBUTING.md,LICENSE,.github \
            -DestinationPath ai_model_router-windows.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
