name: Release

on:
  release:
    types: [created]

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create release archive
        run: |
          tar -czf ai_model_router.tar.gz \
            AI_MODEL_ROUTER.py \
            config.json \
            requirements.txt \
            INICIAR-AI_MODEL_ROUTER.bat \
            README.md \
            CONTRIBUTING.md \
            LICENSE \
            .github

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./ai_model_router.tar.gz
          asset_name: ai_model_router.tar.gz
          asset_content_type: application/gzip

  windows-build:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Windows release archive
        run: |
          Compress-Archive \
            -Path AI_MODEL_ROUTER.py,config.json,requirements.txt,INICIAR-AI_MODEL_ROUTER.bat,README.md,CONTRIBUTING.md,LICENSE,.github \
            -DestinationPath ai_model_router-windows.zip

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./ai_model_router-windows.zip
          asset_name: ai_model_router-windows.zip
          asset_content_type: application/zip
